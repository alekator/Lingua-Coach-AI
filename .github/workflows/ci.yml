name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-lint-and-tests:
    name: Backend Lint + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/api/requirements.txt
            services/asr/requirements.txt
            services/tts/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          python -m pip install -r services/api/requirements.txt
          python -m pip install -r services/asr/requirements.txt
          python -m pip install -r services/tts/requirements.txt

      - name: Lint Python sources (critical rules)
        run: ruff check --select E9,F63,F7,F82 services scripts

      - name: Validate API migrations
        working-directory: services/api
        env:
          PYTHONPATH: .
        run: python -m alembic -c alembic.ini upgrade head

      - name: API tests
        working-directory: services/api
        env:
          PYTHONPATH: .
        run: python -m pytest -q

      - name: ASR tests
        working-directory: services/asr
        env:
          PYTHONPATH: .
        run: python -m pytest -q

      - name: TTS tests
        working-directory: services/tts
        env:
          PYTHONPATH: .
        run: python -m pytest -q

  web-test-and-build:
    name: Web Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Web tests
        working-directory: web
        run: npm run test

      - name: Web build
        working-directory: web
        run: npm run build

  e2e-smoke:
    name: E2E Smoke (Critical Paths)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - backend-lint-and-tests
      - web-test-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r services/api/requirements.txt

      - name: Start API server
        run: |
          python -m uvicorn app.main:app --app-dir services/api --host 127.0.0.1 --port 8000 > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          cat /tmp/api.log || true
          exit 1

      - name: Run E2E key paths
        shell: pwsh
        run: ./scripts/e2e-key-paths.ps1 -BaseUrl http://127.0.0.1:8000 -UserId 1

      - name: Run E2E workspace journey
        shell: pwsh
        run: ./scripts/e2e-workspace-journey.ps1 -BaseUrl http://127.0.0.1:8000 -UserId 1

      - name: Upload API logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-log-${{ github.run_id }}
          path: /tmp/api.log
          if-no-files-found: ignore

      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            kill $(cat /tmp/api.pid) || true
          fi
