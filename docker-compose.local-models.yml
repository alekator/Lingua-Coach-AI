services:
  api:
    environment:
      API_LLM_PROVIDER: local
      ASR_PROVIDER: local
      TTS_PROVIDER: local
      LOCAL_LLM_MODEL_PATH: /models/qwen2.5-7b/qwen2.5-7b-instruct-q4_k_m.gguf
      LOCAL_ASR_MODEL_PATH: /models/whisper-small
      LOCAL_TTS_MODEL_PATH: /models/qwen3-tts
      LOCAL_LLM_N_CTX: ${LOCAL_LLM_N_CTX:-4096}
      LOCAL_LLM_N_THREADS: ${LOCAL_LLM_N_THREADS:-6}
    volumes:
      - ${LOCAL_MODELS_ROOT:-./models}:/models:ro
    mem_limit: 8g

  asr:
    environment:
      ASR_PROVIDER: local
      LOCAL_ASR_MODEL_PATH: /models/whisper-small
      LOCAL_ASR_DEVICE: ${LOCAL_ASR_DEVICE:-auto}
      LOCAL_ASR_COMPUTE_TYPE: ${LOCAL_ASR_COMPUTE_TYPE:-int8}
    volumes:
      - ${LOCAL_MODELS_ROOT:-./models}:/models:ro
    mem_limit: 6g

  tts:
    environment:
      TTS_PROVIDER: local
      LOCAL_TTS_MODEL_PATH: /models/qwen3-tts
    volumes:
      - ${LOCAL_MODELS_ROOT:-./models}:/models:ro
    mem_limit: 8g
