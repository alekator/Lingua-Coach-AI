<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaCoach AI - Offline</title>
    <style>
      :root {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: #0f172a;
        background: radial-gradient(circle at 10% 10%, #fef3c7, #e0f2fe 45%, #f8fafc 80%);
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      main {
        width: min(560px, 100%);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid #dbeafe;
        border-radius: 14px;
        padding: 18px;
      }
      h1 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>LinguaCoach could not reach the network. Reconnect and reload to continue full coaching sessions.</p>
    </main>
  </body>
</html>
