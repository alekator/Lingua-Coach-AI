services:
  postgres:
    restart: unless-stopped
    ports: []

  api:
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/linguacoach}
    depends_on:
      postgres:
        condition: service_healthy
      asr:
        condition: service_started
      tts:
        condition: service_started

  asr:
    restart: unless-stopped

  tts:
    restart: unless-stopped
